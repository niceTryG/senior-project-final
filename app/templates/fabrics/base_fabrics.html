{% extends "dashboard/base_legacy_compat.html" %}

{% block extra_css %}
{{ super() }}
<style>
  .mm-fabrics-app {
    --mm-ink: #132238;
    --mm-muted-ink: #6b7b90;
    --mm-line: rgba(19, 34, 56, 0.10);
    --mm-line-strong: rgba(19, 34, 56, 0.16);
    --mm-surface: rgba(255, 255, 255, 0.92);
    --mm-surface-soft: rgba(248, 251, 255, 0.96);
    --mm-shadow: 0 18px 40px rgba(12, 30, 54, 0.10);
    --mm-shadow-soft: 0 10px 24px rgba(12, 30, 54, 0.08);
    color: var(--mm-ink);
  }

  .mm-fabrics-page {
    max-width: 1380px;
    margin: 0 auto;
  }

  .mm-fabrics-hero {
    position: relative;
    overflow: hidden;
    margin-bottom: 16px;
    padding: 22px 22px 18px;
    border-radius: 28px;
    background:
      radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 28%),
      radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.12), transparent 24%),
      linear-gradient(135deg, #0f1a34 0%, #173056 56%, #214878 100%);
    box-shadow: 0 24px 56px rgba(7, 17, 31, 0.22);
    color: #fff;
  }

  .mm-fabrics-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255,255,255,0.07), transparent 42%);
    pointer-events: none;
  }

  .mm-fabrics-hero > * {
    position: relative;
    z-index: 1;
  }

  .mm-fabrics-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.14);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .mm-fabrics-title {
    margin: 0;
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.04;
    font-weight: 900;
    letter-spacing: -0.03em;
  }

  .mm-fabrics-subtitle {
    margin: 10px 0 0;
    max-width: 760px;
    color: rgba(255,255,255,0.78);
    font-size: 14px;
    line-height: 1.65;
  }

  .mm-fabrics-ratebox {
    min-width: 220px;
    padding: 16px 18px;
    border-radius: 20px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .mm-fabrics-ratebox-label {
    font-size: 12px;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 800;
  }

  .mm-fabrics-ratebox-value {
    margin-top: 6px;
    font-size: 22px;
    line-height: 1.05;
    font-weight: 900;
    color: #fff;
  }
</style>
{% endblock %}

{% block content %}
<div class="mm-fabrics-app">
  {% block fabrics_content %}{% endblock %}
</div>
{% endblock %}
