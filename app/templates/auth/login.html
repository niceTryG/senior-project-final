{% extends "base.html" %} {% block content %}

<div
  class="d-flex justify-content-center align-items-center"
  style="min-height: 80vh"
>
  <div class="col-md-4 bg-white p-4 rounded shadow-lg">
    <!-- BISMILLAH -->
    <h2
      class="text-center mb-4"
      style="font-family: &quot;Times New Roman&quot;, serif; font-size: 32px"
    >
      بِسْمِ ٱللَّٰهِ
    </h2>

    <h3 class="mb-3">{{ t('login_title') }}</h3>

    {% if error_key %}
    <div class="alert alert-danger">{{ t(error_key) }}</div>
    {% endif %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">{{ t('login_username') }}</label>
        <input
          type="text"
          name="username"
          class="form-control"
          required
          autofocus
        />
      </div>

      <div class="mb-3">
        <label class="form-label">{{ t('login_password') }}</label>
        <input type="password" name="password" class="form-control" required />
      </div>

      <!-- Remember Me -->
      <div class="form-check mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          value="1"
          id="remember"
          name="remember"
          checked
        />
        <label class="form-check-label" for="remember"> {{ t('login_remember_me') }} </label>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        {{ t('login_button') }}
      </button>
    </form>

    <p class="mt-3 mb-0">
      <small class="text-muted"> {{ t('login_default_user') }} </small>
    </p>
  </div>
</div>

{% endblock %}
