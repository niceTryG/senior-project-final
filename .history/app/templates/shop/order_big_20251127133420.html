<div class="card shadow-sm border-0 mb-3">
  <div class="card-body">
    <h5 class="mb-1">Оформить крупный заказ</h5>
    <p class="text-muted small">Если нужного количества нет на складе — создастся заказ фабрике.</p>

    <form method="post">
      <div class="row g-2">
        <input type="hidden" name="allow_partial" value="1">

        <div class="col-md-4">
          <label class="form-label small">Товар</label>
          <select name="product_id" class="form-select form-select-sm">
            {% for p in products %}
              <option value="{{p.id}}">{{p.name}} (в магазине: {{p.shop_stock.quantity if p.shop_stock else 0}})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label small">Количество</label>
          <input name="quantity" type="number" class="form-control form-control-sm" min="1" required>
        </div>

        <div class="col-md-3">
          <label class="form-label small">Клиент</label>
          <input name="customer_name" class="form-control form-control-sm">
        </div>

        <div class="col-md-2">
          <button class="btn btn-sm btn-warning text-dark mt-3 w-100">ОК</button>
        </div>
      </div>
    </form>

  </div>
</div>
