{% extends "base.html" %}
{% block content %}

<div class="container py-3 py-md-4">
  <h1 class="h5 mb-3">Продажа из магазина / большой заказ</h1>

  <p class="small text-muted">
    Здесь можно оформить обычную продажу из магазина или большой заказ на несколько штук.
  </p>

  <form method="post">
    <div class="mb-3">
      <label class="form-label">Товар</label>
      <select name="product_id" class="form-select" required>
        <option value="">— выберите товар —</option>
        {% for p in products %}
          <option value="{{ p.id }}">
            {{ p.name }} — {{ p.sell_price_per_item or 0 }} UZS
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Количество (шт.)</label>
      <input type="number" name="quantity" class="form-control" min="1" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Имя клиента (необязательно)</label>
      <input type="text" name="customer_name" class="form-control" placeholder="Например: Ali, Saida ...">
    </div>

    <div class="mb-3">
      <label class="form-label">Телефон клиента (необязательно)</label>
      <input type="text" name="customer_phone" class="form-control" placeholder="+998 ..">
    </div>

    <div class="mb-3">
      <label class="form-label">Комментарий (необязательно)</label>
      <textarea name="note" class="form-control" rows="2"
                placeholder="Например: заберёт завтра, постоянный клиент и т.п."></textarea>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" value="1" id="allow_partial" name="allow_partial" checked>
      <label class="form-check-label" for="allow_partial">
        Если товара мало — продать, сколько есть, остальное оформить как заказ.
      </label>
    </div>

    <button type="submit" class="btn btn-primary">💸 Сохранить продажу</button>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary btn-sm ms-2">
      ← Назад на панель
    </a>
  </form>
</div>

{% endblock %}
