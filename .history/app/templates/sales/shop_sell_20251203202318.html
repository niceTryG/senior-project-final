{% extends "base.html" %}
{% block content %}

<div class="container py-3 py-md-4">
  <h1 class="h5 mb-2">{{ t('shop_sell_title') }}</h1>

  <p class="small text-muted">
    {{ t('shop_sell_subtitle') }}
  </p>

  <form method="post">
    <div class="mb-3">
      <label class="form-label">{{ t('shop_sell_product_label') }}</label>
      <select name="product_id" class="form-select" required>
        <option value="">{{ t('shop_sell_select_placeholder') }}</option>
        {% for p in products %}
          <option value="{{ p.id }}">
            {{ p.name }} — {{ p.sell_price_per_item or 0 }} UZS
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">{{ t('shop_sell_quantity_label') }}</label>
      <input type="number" name="quantity" class="form-control" min="1" required>
    </div>

    <div class="mb-3">
      <label class="form-label">{{ t('shop_sell_customer_name_label') }}</label>
      <input type="text" name="customer_name" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">{{ t('shop_sell_customer_phone_label') }}</label>
      <input type="text" name="customer_phone" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">{{ t('shop_sell_note_label') }}</label>
      <textarea name="note"
                class="form-control"
                rows="2"
                placeholder="{{ t('shop_sell_note_placeholder') }}"></textarea>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input"
             type="checkbox"
             value="1"
             id="allow_partial"
             name="allow_partial"
             checked>
      <label class="form-check-label" for="allow_partial">
        {{ t('shop_sell_allow_partial_label') }}
      </label>
    </div>

    <button type="submit" class="btn btn-primary">💸 {{ t('shop_sell_submit') }}</button>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary btn-sm ms-2">
      ← {{ t('shop_sell_back') }}
    </a>
  </form>
</div>

{% endblock %}
