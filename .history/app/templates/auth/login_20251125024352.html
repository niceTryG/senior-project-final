{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2 class="mb-3">{{ t('login_title') }}</h2>

    {% if error_key %}
      <div class="alert alert-danger">{{ t(error_key) }}</div>
    {% endif %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">{{ t('login_username') }}</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">{{ t('login_password') }}</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary">{{ t('login_button') }}</button>
    </form>

    <p class="mt-3">
      <small>{{ t('login_default_user') }}</small>
    </p>
  </div>
</div>
{% endblock %}
