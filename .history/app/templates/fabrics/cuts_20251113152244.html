{% extends "base.html" %}
{% block content %}
<h1 class="mb-3">История списаний ткани</h1>

<form method="get" class="row g-2 mb-3">
  <div class="col-md-3">
    <label class="form-label">От даты</label>
    <input type="date" name="from" class="form-control" value="{{ date_from }}">
  </div>
  <div class="col-md-3">
    <label class="form-label">До даты</label>
    <input type="date" name="to" class="form-control" value="{{ date_to }}">
  </div>
  <div class="col-md-3 d-flex align-items-end">
    <button type="submit" class="btn btn-secondary w-100">Фильтр</button>
  </div>
</form>

<div class="table-responsive">
  <table class="table table-sm table-bordered align-middle">
    <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Дата</th>
        <th>Ткань</th>
        <th>Списанное количество</th>
        <th>Ед. изм.</th>
      </tr>
    </thead>
    <tbody>
    {% for c in cuts %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.cut_date }}</td>
        <td>{{ c.fabric.name }}</td>
        <td>{{ "%.2f"|format(c.used_amount) }}</td>
        <td>{{ c.fabric.unit }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
