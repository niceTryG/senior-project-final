{% extends "base.html" %}
{% block content %}
<div class="container py-3">

  <h4 class="mb-1">Выберите листы для импорта</h4>
  <div class="text-muted small mb-3">
    Файл: <span class="fw-semibold">{{ batch.filename }}</span>
  </div>

  <form method="post" action="{{ url_for('products.import_confirm') }}">
    <input type="hidden" name="batch_id" value="{{ batch.id }}">

    <div class="card shadow-sm border-0 mb-3">
      <div class="card-body">
        <div class="fw-semibold mb-2">✅ Что импортировать</div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="update_prices" value="1" id="p1" checked>
          <label class="form-check-label" for="p1">Обновить цены моделей (Нархи/Цена)</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="do_sales" value="1" id="s1">
          <label class="form-check-label" for="s1">Импортировать Реализацию (Sales)</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="do_cash" value="1" id="c1">
          <label class="form-check-label" for="c1">Импортировать Кассу (Cash)</label>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-header py-2">
        <span class="fw-semibold small">📄 Листы в Excel</span>
      </div>
      <div class="card-body">
        {% for s in sheet_info %}
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="sheets" value="{{ s.name }}" id="sh-{{ loop.index }}">
            <label class="form-check-label" for="sh-{{ loop.index }}">
              <span class="fw-semibold">{{ s.name }}</span>
              {% if s.tags %}
                <span class="ms-2 badge bg-info text-dark">{{ s.tags|join(', ') }}</span>
              {% endif %}
            </label>
          </div>
        {% endfor %}
      </div>
    </div>

    <div class="d-flex gap-2 mt-3">
      <a href="{{ url_for('products.import_wizard') }}" class="btn btn-outline-secondary">Назад</a>
      <button type="submit" class="btn btn-primary">Импортировать</button>
    </div>
  </form>

</div>
{% endblock %}
