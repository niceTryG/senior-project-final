{% extends "base.html" %}

{% block title %}{{ t('products_page_title') }}{% endblock %}

{% block extra_css %}
<style>
  /* Prevent fixed bottom nav from covering page content */
  .mm-page-products {
    padding-bottom: 96px; /* adjust if your bottom nav is taller */
    padding-top: 10px;
  }

  /* ===== Neo header/actions ===== */
  .mm-head {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:.75rem;
    margin-bottom:.5rem;
  }
  .mm-head h1 { line-height: 1.1; }

  .mm-actions .btn {
    border-radius: 14px;
    font-weight: 750;
  }
  .mm-actions .btn-sm { padding: .62rem .80rem; }
  .mm-chip-link{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:100%;
    border-radius: 999px;
    padding: .50rem .75rem;
    border: 1px solid rgba(0,0,0,.10);
    background:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:.88rem;
  }

  /* ===== Filters ===== */
  .mm-filter-btn{
    border-radius: 14px;
    font-weight: 750;
    padding: .62rem .80rem;
  }
  .mm-filters-card .form-control,
  .mm-filters-card .form-select{
    border-radius: 12px;
  }

  /* ===== Mobile product card polish ===== */
  .mm-product-card { border-radius: 18px; }
  .mm-product-card-title { line-height: 1.15; }

  /* Key-value rows inside mobile cards */
  .mm-kv {
    display: flex;
    justify-content: space-between;
    gap: .75rem;
    padding: .35rem 0;
    border-bottom: 1px dashed rgba(0,0,0,.10);
  }
  .mm-kv:last-child { border-bottom: 0; }
  .mm-k { color: #6c757d; font-size: .82rem; }
  .mm-v { font-weight: 700; text-align: right; }

  /* Big total pill */
  .mm-total-pill{
    border-radius: 14px;
    padding: .55rem .75rem;
    font-weight: 850;
    font-size: 1.05rem;
    min-width: 56px;
    text-align:center;
  }

  /* Compact card action buttons */
  .mm-card-btn{
    border-radius: 14px;
    font-weight: 750;
    padding: .62rem .80rem;
  }

  /* Accordion buttons compact */
  .mm-acc-btn { padding: .55rem .75rem; border-radius: 14px; }
  .accordion-item { border-radius: 14px; overflow:hidden; }

  /* Make forms feel modern */
  .form-control, .form-select { border-radius: 12px; }

</style>
{% endblock %}

{% block content %}
<div class="container-fluid mm-page-products">

  <!-- HEADER + ACTIONS (neo + compact) -->
  <div class="mm-head">
    <div>
      <h1 class="h5 fw-semibold mb-0">{{ t('products_page_header') }}</h1>
      <div class="text-muted small d-none d-md-block">
        {{ t('products_page_subtitle') }}
      </div>
    </div>
  </div>

  <div class="mm-actions mb-2">
    <div class="row g-2">
      <div class="col-6 col-md-auto">
        <button type="button"
                class="btn btn-primary btn-sm w-100"
                data-bs-toggle="modal"
                data-bs-target="#addProductModal">
          ➕ {{ t('products_button_add') }}
        </button>
      </div>

      <div class="col-6 col-md-auto">
        <button type="button"
                class="btn btn-outline-primary btn-sm w-100"
                data-bs-toggle="modal"
                data-bs-target="#importExcelModal">
          📄 {{ t('products_button_import_excel') }}
        </button>
      </div>

      <!-- History: chip on mobile, normal button on desktop -->
      <div class="col-12 d-md-none">
        <a href="{{ url_for('sales.list_sales') }}"
           class="mm-chip-link text-dark">
          🧾 {{ t('products_button_sales_history') }}
        </a>
      </div>

      <div class="col-12 d-none d-md-block">
        <a href="{{ url_for('sales.list_sales') }}" class="btn btn-outline-secondary btn-sm">
          🧾 {{ t('products_button_sales_history') }}
        </a>
      </div>
    </div>
  </div>

  <!-- FILTERS (collapse on mobile) -->
  <div class="card shadow-sm border-0 mb-3 mm-filters-card">
    <div class="card-body p-2 p-md-3">

      <button class="btn btn-outline-secondary btn-sm w-100 d-md-none mm-filter-btn"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mmFilters"
              aria-expanded="false"
              aria-controls="mmFilters">
        🔎 Поиск / фильтр
      </button>

      <div class="collapse d-md-block mt-2 mt-md-0" id="mmFilters">
        <form method="get" class="row g-2 align-items-end">
          <div class="col-12 col-md-7">
            <label class="form-label small mb-1">{{ t('products_filter_search_label') }}</label>
            <input type="text"
                   class="form-control form-control-sm"
                   name="q"
                   placeholder="{{ t('products_filter_search_placeholder') }}"
                   value="{{ q }}">
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label small mb-1">{{ t('products_filter_category_label') }}</label>
            <select class="form-select form-select-sm" name="category">
              <option value="">{{ t('products_filter_category_all') }}</option>
              {% for cat in categories %}
                <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>
                  {{ cat }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-12 col-md-1">
            <button type="submit" class="btn btn-secondary btn-sm w-100">
              ✅
            </button>
          </div>
        </form>
      </div>
