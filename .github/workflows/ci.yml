name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-preflight:
    runs-on: ubuntu-latest
    env:
      FLASK_CONFIG: config.ProdConfig
      SECRET_KEY: ci-test-secret-key
      DATABASE_URL: sqlite:///ci.db
      PROD_ALLOW_SQLITE: "1"
      AUTO_DB_BOOTSTRAP: "0"
      SESSION_COOKIE_SECURE: "1"
      REMEMBER_COOKIE_SECURE: "1"
      TELEGRAM_BOT_TOKEN: ci-test-bot-token
      PUBLIC_TELEGRAM_URL: https://t.me/minimoda_sklad_bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Verify Alembic head exists
        run: python -m flask --app wsgi db heads

      - name: Apply migrations
        run: python -m flask --app wsgi db-upgrade

      - name: Run deploy preflight
        run: python -m flask --app wsgi deploy-preflight
